# Build the app, Storybook, and the prompt-builder and publish them to GitHub Pages.
# The app is served at the Pages root (/coderpad-prysm/); the design-system
# Storybook is nested under /coderpad-prysm/storybook/ and the interview
# prompt-builder under /coderpad-prysm/prompt-builder/. GitHub Pages serves a
# single site per repo, so all three are combined into one artifact.
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app, Storybook, and prompt-builder
        run: pnpm build
      - name: Assemble Pages site
        # App at the root, Storybook under /storybook, prompt-builder under /prompt-builder.
        run: |
          mkdir -p _site/storybook _site/prompt-builder
          cp -r app/dist/. _site/
          cp -r storybook/storybook-static/. _site/storybook/
          cp -r prompt-builder/dist/. _site/prompt-builder/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
